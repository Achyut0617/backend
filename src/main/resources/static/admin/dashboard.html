<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - MultiVendor</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
        <nav>
            <a href="#" onclick="logout('admin')">Logout</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h2>Pending Vendors</h2>
            <div id="vendorsBox">Loading...</div>
        </div>
        <div class="card" style="margin-top: 20px;">
            <h2>Service Requests (Bookings)</h2>
            <div id="bookingsBox">Loading...</div>
        </div>
        <div class="card" style="margin-top: 20px;">
            <h2>Payments</h2>
            <div id="paymentsBox">Loading...</div>
        </div>
        <div class="card" style="margin-top: 20px;">
            <h2>Settlements</h2>
            <div id="settlementsBox">Loading...</div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        checkAuth('admin');

        async function loadVendors() {
            try {
                const data = await apiCall('/api/admin/vendors?status=PENDING', 'GET', null, 'admin');
                const vendors = data.content;
                if (vendors.length === 0) {
                    document.getElementById('vendorsBox').innerHTML = '<p>No pending vendors.</p>';
                    return;
                }
                let html = '<table><tr><th>Name</th><th>Email</th><th>City</th><th>Action</th></tr>';
                vendors.forEach(v => {
                    html += `<tr>
                        <td>${v.name}</td>
                        <td>${v.email}</td>
                        <td>${v.city}</td>
                        <td>
                            <button class="btn" style="background:green" onclick="approveVendor(${v.id})">Approve</button>
                        </td>
                    </tr>`;
                });
                html += '</table>';
                document.getElementById('vendorsBox').innerHTML = html;
            } catch (err) {
                document.getElementById('vendorsBox').innerHTML = '<span class="error">Failed to load vendors</span>';
            }
        }

        async function approveVendor(id) {
            try {
                await apiCall(`/api/admin/vendors/${id}/action`, 'POST', {action: 'APPROVE', reason: 'Approved via UI'}, 'admin');
                alert('Vendor approved');
                loadVendors();
            } catch (err) {
                alert('Action failed: ' + err.message);
            }
        }

        async function loadBookings() {
            try {
                const data = await apiCall('/api/admin/bookings?size=50', 'GET', null, 'admin');
                const bookings = data.content;
                if (!bookings || bookings.length === 0) {
                    document.getElementById('bookingsBox').innerHTML = '<p>No service requests found.</p>';
                    return;
                }
                let html = '<table><tr><th>ID</th><th>Ref</th><th>Service</th><th>Customer</th><th>Vendor</th><th>Date</th><th>Status</th></tr>';
                bookings.forEach(b => {
                    const serviceName = b.service ? b.service.title : 'N/A';
                    const customerName = b.customer ? b.customer.name : 'N/A';
                    const vendorName = b.vendor ? (b.vendor.businessName || b.vendor.name) : 'N/A';
                    const date = b.scheduledAt ? new Date(b.scheduledAt).toLocaleString() : 'N/A';
                    html += `<tr>
                        <td>${b.id}</td>
                        <td>${b.bookingRef || 'N/A'}</td>
                        <td>${serviceName}</td>
                        <td>${customerName}</td>
                        <td>${vendorName}</td>
                        <td>${date}</td>
                        <td><strong>${b.status}</strong></td>
                    </tr>`;
                });
                html += '</table>';
                document.getElementById('bookingsBox').innerHTML = html;
            } catch (err) {
                console.error(err);
                document.getElementById('bookingsBox').innerHTML = '<span class="error">Failed to load bookings</span>';
            }
        }

        async function loadPayments() {
            try {
                const data = await apiCall('/api/admin/payments?size=50', 'GET', null, 'admin');
                const payments = data.content;
                if (!payments || payments.length === 0) {
                    document.getElementById('paymentsBox').innerHTML = '<p>No payments found.</p>';
                    return;
                }
                let html = '<table><tr><th>ID</th><th>Booking</th><th>Customer</th><th>Vendor</th><th>Amount</th><th>Method</th><th>Status</th></tr>';
                payments.forEach(p => {
                    html += `<tr>
                        <td>${p.id}</td>
                        <td>${p.bookingRef || 'N/A'}</td>
                        <td>${p.customerName || 'N/A'}</td>
                        <td>${p.vendorName || 'N/A'}</td>
                        <td>₹${p.amount}</td>
                        <td>${p.method || 'N/A'}</td>
                        <td><strong>${p.status}</strong></td>
                    </tr>`;
                });
                html += '</table>';
                document.getElementById('paymentsBox').innerHTML = html;
            } catch (err) {
                console.error(err);
                document.getElementById('paymentsBox').innerHTML = '<span class="error">Failed to load payments</span>';
            }
        }

        async function loadSettlements() {
            try {
                const data = await apiCall('/api/admin/settlements?size=50', 'GET', null, 'admin');
                const settlements = data.content;
                if (!settlements || settlements.length === 0) {
                    document.getElementById('settlementsBox').innerHTML = '<p>No settlements found.</p>';
                    return;
                }
                let html = '<table><tr><th>ID</th><th>Vendor</th><th>Amount</th><th>Period</th><th>Status</th><th>UTR</th><th>Action</th></tr>';
                settlements.forEach(s => {
                    const period = (s.periodFrom && s.periodTo) ? `${s.periodFrom} to ${s.periodTo}` : 'N/A';
                    html += `<tr>
                        <td>${s.id}</td>
                        <td>${s.vendorName || 'N/A'}</td>
                        <td>₹${s.amount}</td>
                        <td>${period}</td>
                        <td><strong>${s.status}</strong></td>
                        <td>${s.utrNumber || '-'}</td>
                        <td>`;
                    if (s.status === 'PENDING' || s.status === 'PROCESSING') {
                        html += `<button class="btn" style="background:green" onclick="processSettlement(${s.id})">Mark Settled</button>`;
                    } else {
                        html += `<span>Completed</span>`;
                    }
                    html += `</td></tr>`;
                });
                html += '</table>';
                document.getElementById('settlementsBox').innerHTML = html;
            } catch (err) {
                console.error(err);
                document.getElementById('settlementsBox').innerHTML = '<span class="error">Failed to load settlements</span>';
            }
        }

        async function processSettlement(id) {
            const utr = prompt("Enter UTR / Transaction Reference Number:");
            if (!utr) return;
            const remarks = prompt("Enter any remarks (optional):");
            
            try {
                await apiCall(`/api/admin/settlements/${id}/process`, 'POST', {utrNumber: utr, remarks: remarks || ''}, 'admin');
                alert('Settlement processed successfully');
                loadSettlements();
            } catch (err) {
                alert('Action failed: ' + err.message);
            }
        }

        loadVendors();
        loadBookings();
        loadPayments();
        loadSettlements();
    </script>
</body>
</html>
