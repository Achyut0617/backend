<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - MultiVendor</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>Admin Portal</h1>
        <nav><a href="/">Home</a></nav>
    </header>

    <div class="container">
        <div class="card" style="max-width: 400px; margin: 0 auto;">
            <h2>Admin Login</h2>
            <div id="errorMsg" class="error"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" class="form-control" value="admin@multivendor.com" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="password" class="form-control" value="Admin@123" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const data = await apiCall('/api/admin/auth/login', 'POST', {email, password});
                setToken('admin', data.token);
                window.location.href = '/admin/dashboard.html';
            } catch (err) {
                document.getElementById('errorMsg').innerText = err.message;
            }
        });
    </script>
</body>
</html>
