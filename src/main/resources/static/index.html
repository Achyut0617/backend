<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MultiVendor Service Platform</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .hero { text-align: center; padding: 4rem 1rem; background: #3498db; color: white; margin-bottom: 2rem; border-radius: 8px; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .portal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .portal-card { background: white; padding: 2rem; text-align: center; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .portal-card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .portal-card h2 { color: #2c3e50; }
        .portal-card a { display: inline-block; margin-top: 1rem; padding: 0.75rem 1.5rem; background: #3498db; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .portal-card a:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Welcome to MultiVendor Platform</h1>
            <p>Connect with the best service professionals in your area.</p>
        </div>
        
        <div class="portal-grid">
            <div class="portal-card">
                <h2>Customer Portal</h2>
                <p>Book professional services easily.</p>
                <a href="/customer/login.html">Enter as Customer</a>
            </div>
            <div class="portal-card">
                <h2>Vendor Portal</h2>
                <p>Manage your services and bookings.</p>
                <a href="/vendor/login.html">Enter as Vendor</a>
            </div>
            <div class="portal-card">
                <h2>Admin Portal</h2>
                <p>Platform monitoring and approvals.</p>
                <a href="/admin/login.html">Enter as Admin</a>
            </div>
        </div>
    </div>
</body>
</html>
