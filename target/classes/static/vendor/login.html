<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vendor Login - MultiVendor</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>Vendor Portal</h1>
        <nav><a href="/">Home</a></nav>
    </header>

    <div class="container">
        <div class="card" style="max-width: 400px; margin: 0 auto;">
            <h2>Vendor Login</h2>
            <div id="errorMsg" class="error"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <hr style="margin: 1rem 0;">
            <h3>New Vendor?</h3>
            <form id="registerForm">
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" id="regName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="regEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Phone (10 digits starting with 6-9):</label>
                    <input type="text" id="regPhone" class="form-control" pattern="^[6-9]\d{9}$" required>
                </div>
                <div class="form-group">
                    <label>Password (min 8 chars):</label>
                    <input type="password" id="regPassword" class="form-control" minlength="8" required>
                </div>
                <div class="form-group">
                    <label>City:</label>
                    <input type="text" id="regCity" class="form-control" required>
                </div>
                <button type="submit" class="btn" style="background: green;">Register</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const data = await apiCall('/api/vendor/auth/login', 'POST', {email, password});
                setToken('vendor', data.token);
                window.location.href = '/vendor/dashboard.html';
            } catch (err) {
                document.getElementById('errorMsg').innerText = err.message;
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value,
                password: document.getElementById('regPassword').value,
                city: document.getElementById('regCity').value,
                state: 'State'
            };
            try {
                await apiCall('/api/vendor/auth/register', 'POST', payload);
                alert('Registration successful. Wait for Admin approval.');
            } catch (err) {
                document.getElementById('errorMsg').innerText = err.message;
            }
        });
    </script>
</body>
</html>
